<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:#f4f6f9;">

<div style="display:flex; justify-content:center; align-items:center; height:100vh;">
    
    <form style="background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px;">
        
        <h2 style="text-align:center; margin-bottom:20px;">Lon</h2>
        
        <label>Username</label>
        <input type="text" placeholder="Enter username" required
        style="width:100%; padding:10px; margin:8px 0 15px 0; border:1px solid #ccc; border-radius:5px;">
        
        <label>Password</label>
        <input type="password" placeholder="Enter password" required
        style="width:100%; padding:10px; margin:8px 0 20px 0; border:1px solid #ccc; border-radius:5px;">
        
        <button type="submit"
        style="width:100%; padding:10px; background:#007BFF; color:white; border:none; border-radius:5px; cursor:pointer;">
        Login
        </button>
        
        <p style="text-align:center; margin-top:15px;">
            <a href="#" style="text-decoration:none;">Forgot Password?</a>
        </p>
        
    </form>

</div>

</body>
</html>
